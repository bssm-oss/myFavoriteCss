services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: morph
      POSTGRES_PASSWORD: morph
      POSTGRES_DB: morph_ui
    ports:
      - "54329:5432"
    volumes:
      - morph_ui_postgres:/var/lib/postgresql/data

volumes:
  morph_ui_postgres:
